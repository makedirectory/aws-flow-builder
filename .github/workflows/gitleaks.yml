name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full-history sweep, Mondays at 07:00 UTC, to catch anything that
    # slipped in before this scan existed (or via a force-push).
    - cron: "0 7 * * 1"

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so the scan covers every commit, not just the PR diff.
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
